# Render Blueprint — Static Site (recommended for this Vite + React portfolio)
# Docs: https://render.com/docs/static-sites

services:
  - type: web
    name: portfolio-bhavya
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
