# Repo root Blueprint — app lives in /portfolio
# https://render.com/docs/static-sites

services:
  - type: web
    name: portfolio-bhavya
    runtime: static
    rootDir: portfolio
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: '20'
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
