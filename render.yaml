# Repo root Blueprint — app lives in /portfolio
# https://render.com/docs/static-sites
#
# Option A (recommended): Static Site — no start command needed
# Option B: Web Service — uses root package.json → portfolio/

services:
  - type: web
    name: portfolio-bhavya
    runtime: static
    rootDir: portfolio
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: '20'
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Uncomment for Web Service instead of Static Site:
  # - type: web
  #   name: portfolio-bhavya-web
  #   runtime: node
  #   buildCommand: npm install && npm run build
  #   startCommand: npm start
  #   envVars:
  #     - key: NODE_VERSION
  #       value: '20'
